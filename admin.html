<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 聖荷西好物購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .admin-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .status-on { color: #10b981; background: #ecfdf5; }
        .status-off { color: #ef4444; background: #fef2f2; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 999; display: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-pink-500 border-t-transparent"></div>
    </div>

    <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl text-center border border-pink-50">
            <span class="text-5xl mb-4 block">🔐</span>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">後台管理系統</h2>
            <p class="text-gray-500 mb-8">請使用授權的 Google 帳號登入</p>
            <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-3 rounded-xl font-bold text-gray-700 hover:bg-gray-50 transition-all shadow-sm">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6">
                使用 Google 帳號登入
            </button>
            <div id="error-msg" class="mt-4 text-red-500 text-sm hidden font-medium">⚠️ 此帳號無管理權限，請切換帳號。</div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden">
        <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-2">
                        <span class="text-xl">🦋</span>
                        <span class="font-bold text-gray-800">聖荷西管理後台</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span id="user-email" class="text-sm text-gray-500 hidden sm:inline"></span>
                        <button onclick="logout()" class="text-sm text-red-500 font-bold hover:bg-red-50 px-3 py-1 rounded-lg">登出</button>
                    </div>
                </div>
            </div>
        </nav>

        <header class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">商品上/下架管理</h1>
                    <p class="text-gray-500 text-sm mt-1">控制 B 欄 (庫存狀態) 的開關</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="loadProducts()" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-bold text-sm hover:bg-gray-50">
                        <i class="fas fa-sync-alt mr-2"></i>重新整理
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
            <div class="admin-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">編號(A)</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">商品資訊(F/K)</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">目前狀態(B)</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody id="product-list-body" class="bg-white divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. 整合後的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDr77JtFj5BT8ebtj7vO1NSXndX8N9Un4A",
            authDomain: "planning-with-ai-db7cf.firebaseapp.com",
            projectId: "planning-with-ai-db7cf",
            storageBucket: "planning-with-ai-db7cf.firebasestorage.app",
            messagingSenderId: "945246443460",
            appId: "1:945246443460:web:62e3b41d2bff330ab2b691"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 2. 授權清單
        const AUTHORIZED_EMAILS = [
            "colleen0219@gmail.com",
            "sanjosegogo.tw@gmail.com"
        ];

        // 3. GAS API 網址 (請確保此網址為最新部署的版本)
        const GAS_API = "https://script.google.com/macros/s/AKfycbx64j6HKGdHQVaYDw_7XN7YXK6kl5kUgBTCiEJ2tkKdevuu2bZ0S-WNDOdGk8Ytluum/exec";

        // --- 登入控制邏輯 ---

        document.getElementById('google-login-btn').addEventListener('click', () => {
            auth.signInWithPopup(provider).then((result) => {
                checkAccess(result.user);
            }).catch((error) => {
                alert("登入錯誤: " + error.message);
            });
        });

        function checkAccess(user) {
            if (user && AUTHORIZED_EMAILS.includes(user.email)) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                loadProducts();
            } else if (user) {
                auth.signOut();
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        auth.onAuthStateChanged((user) => {
            if (user) checkAccess(user);
        });

        // --- 商品管理邏輯 ---

        async function loadProducts() {
            const body = document.getElementById('product-list-body');
            body.innerHTML = '<tr><td colspan="4" class="px-6 py-10 text-center text-gray-400">讀取商品清單中...</td></tr>';
            
            try {
                const res = await fetch(`${GAS_API}?action=get_data`);
                const rows = await res.json();
                
                body.innerHTML = '';
                // 排除標題列並過濾無效列
                const products = rows.slice(1).filter(r => r[0] !== "");

                products.forEach(row => {
                    const id = row[0]; // A
                    const isActive = row[1] === true || row[1] === 'TRUE'; // B
                    const name = row[5]; // F
                    const brand = row[10]; // K
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-gray-500">${id}</td>
                        <td class="px-6 py-4">
                            <div class="text-sm font-bold text-gray-900">${name || '未命名商品'}</div>
                            <div class="text-xs text-pink-500 font-medium">${brand || '無品牌'}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-3 py-1 inline-flex text-xs leading-5 font-bold rounded-full ${isActive ? 'status-on' : 'status-off'}">
                                ${isActive ? '● 已上架' : '○ 已下架'}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            <button onclick="toggleStatus('${id}', ${!isActive})" class="font-bold ${isActive ? 'text-red-500' : 'text-emerald-500'} hover:underline">
                                ${isActive ? '執行下架' : '執行上架'}
                            </button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            } catch (e) {
                body.innerHTML = '<tr><td colspan="4" class="px-6 py-10 text-center text-red-400">連線失敗，請檢查 GAS API 是否正確。</td></tr>';
            }
        }

        async function toggleStatus(id, newStatus) {
            const actionText = newStatus ? "上架" : "下架";
            if (!confirm(`確定要將商品 [${id}] ${actionText} 嗎？`)) return;

            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';

            try {
                const url = `${GAS_API}?action=update_status&id=${encodeURIComponent(id)}&status=${newStatus}`;
                const res = await fetch(url);
                const result = await res.json();

                if (result.success) {
                    await loadProducts(); // 重新讀取清單
                } else {
                    alert("更新失敗：" + result.message);
                }
            } catch (e) {
                alert("伺服器連線錯誤，請確認 GAS 腳本已正確部署。");
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
