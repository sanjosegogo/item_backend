<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 聖荷西好物購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <!-- Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .admin-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .status-on { color: #10b981; background: #ecfdf5; }
        .status-off { color: #ef4444; background: #fef2f2; }
    </style>
</head>
<body>

    <!-- 登入介面 -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl text-center">
            <span class="text-5xl mb-4 block">🔐</span>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">後台管理登入</h2>
            <p class="text-gray-500 mb-8">請使用授權的 Google 帳號登入</p>
            <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-3 rounded-xl font-bold text-gray-700 hover:bg-gray-50 transition-all">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6">
                使用 Google 帳號登入
            </button>
            <div id="error-msg" class="mt-4 text-red-500 text-sm hidden">此帳號無管理權限。</div>
        </div>
    </div>

    <!-- 管理主介面 (預設隱藏) -->
    <div id="admin-dashboard" class="hidden">
        <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-2">
                        <span class="text-xl">🦋</span>
                        <span class="font-bold text-gray-800">聖荷西管理後台</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span id="user-email" class="text-sm text-gray-500"></span>
                        <button onclick="logout()" class="text-sm text-red-500 font-medium">登出</button>
                    </div>
                </div>
            </div>
        </nav>

        <header class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">商品庫存管理</h1>
                    <p class="text-gray-500">即時更新 Excel 試算表資料</p>
                </div>
                <button onclick="window.open('https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID_HERE/edit', '_blank')" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold shadow-sm hover:bg-green-700">
                    <i class="fas fa-file-excel mr-2"></i>開啟試算表
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
            <div class="admin-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">編號</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">商品名稱</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">狀態</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">庫存</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody id="product-list-body" class="bg-white divide-y divide-gray-200">
                            <!-- 資料動態插入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. Firebase 設定 (請填入你的 Firebase 專案資訊)
        // 到 Firebase Console > 專案設定 > 您的應用程式 > 選擇 Web (</>) 獲取
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 2. 授權名單
        const AUTHORIZED_EMAILS = [
            "colleen0219@gmail.com",
            "sanjosegogo.tw@gmail.com"
        ];

        // 3. GAS API (沿用之前的)
        const GAS_API = "https://script.google.com/macros/s/AKfycbx64j6HKGdHQVaYDw_7XN7YXK6kl5kUgBTCiEJ2tkKdevuu2bZ0S-WNDOdGk8Ytluum/exec";

        // 登入邏輯
        document.getElementById('google-login-btn').addEventListener('click', () => {
            auth.signInWithPopup(provider).then((result) => {
                const user = result.user;
                checkAccess(user);
            }).catch((error) => {
                console.error(error);
                alert("登入失敗: " + error.message);
            });
        });

        function checkAccess(user) {
            if (user && AUTHORIZED_EMAILS.includes(user.email)) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                loadProducts();
            } else {
                auth.signOut();
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        // 監聽 Auth 狀態
        auth.onAuthStateChanged((user) => {
            if (user) checkAccess(user);
        });

        // 讀取產品列表
        async function loadProducts() {
            const body = document.getElementById('product-list-body');
            body.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-400 text-sm">讀取中...</td></tr>';
            
            try {
                const res = await fetch(`${GAS_API}?action=get_data`);
                const rows = await res.json();
                
                body.innerHTML = '';
                // 假設 Excel 結構：A編號, B上架狀態(TRUE/FALSE), F名稱...
                rows.forEach((row, index) => {
                    if (index === 0 && row[0] === "編號") return; // 跳過標題
                    
                    const tr = document.createElement('tr');
                    const isActive = row[1] === true || row[1] === 'TRUE';
                    
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${row[0]}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900">${row[5] || '未命名'}</div>
                            <div class="text-xs text-gray-400">${row[10] || '-'}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${isActive ? 'status-on' : 'status-off'}">
                                ${isActive ? '已上架' : '已下架'}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${row[6] ? '有' : '無'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <button onclick="toggleStatus('${row[0]}', ${!isActive})" class="text-pink-600 hover:text-pink-900 mr-4">
                                ${isActive ? '下架' : '上架'}
                            </button>
                            <button class="text-gray-400 cursor-not-allowed">編輯細節</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            } catch (e) {
                body.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-red-500 text-sm">讀取失敗，請確認 GAS API。</td></tr>';
            }
        }

        // 切換上架狀態指令 (這部分需要 GAS 端配合寫入邏輯)
        async function toggleStatus(id, newStatus) {
            if(!confirm(`確定要${newStatus ? '上架' : '下架'} 商品 ${id} 嗎？`)) return;
            
            // 這裡發送請求給 GAS
            // 注意：GAS 的 doGet/doPost 必須要能處理 action=update_status&id=xxx&status=true
            const url = `${GAS_API}?action=update_status&id=${id}&status=${newStatus}`;
            
            try {
                const res = await fetch(url);
                const result = await res.json();
                if(result.success) {
                    alert('更新成功！');
                    loadProducts();
                } else {
                    alert('更新失敗：' + result.message);
                }
            } catch(e) {
                alert('發送請求失敗，請確認 GAS 是否支援 update_status 指令。');
            }
        }
    </script>
</body>
</html>
