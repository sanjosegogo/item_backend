<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f8fafc">
  <title>聖荷西好物購 商品後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="auth-view" class="auth-shell">
    <section class="auth-panel">
      <div class="brand-mark">SJ</div>
      <h1>商品後台</h1>
      <p>聖荷西好物購-艾菲精品</p>
      <div id="google-login"></div>
      <button id="auth-retry" class="secondary-action hidden" type="button">
        <i data-lucide="refresh-cw"></i>
        重新載入登入
      </button>
      <div id="auth-message" class="auth-message" role="status"></div>
    </section>
  </div>

  <div id="app-view" class="app-shell hidden">
    <header class="topbar">
      <div>
        <p class="eyebrow">SAN JOSE GOODIES</p>
        <h1>商品管理</h1>
        <p id="user-label" class="user-label">未登入</p>
      </div>
      <button id="sync-button" class="icon-button" type="button" aria-label="同步">
        <i data-lucide="refresh-cw"></i>
      </button>
    </header>

    <main>
      <section class="summary-strip" aria-label="商品狀態">
        <article>
          <span id="count-live">0</span>
          <p>上架</p>
        </article>
        <article>
          <span id="count-paused">0</span>
          <p>下架</p>
        </article>
        <article>
          <span id="count-sale">0</span>
          <p>活動</p>
        </article>
      </section>
      <section id="sale-breakdown" class="sale-breakdown" aria-label="活動數量"></section>

      <section class="control-band">
        <label class="search-box">
          <i data-lucide="search"></i>
          <input id="search-input" type="search" placeholder="搜尋名稱、品牌、活動">
        </label>
        <div class="segmented" role="group" aria-label="篩選商品">
          <button class="segment active" data-filter="all" type="button">全部</button>
          <button class="segment" data-filter="live" type="button">上架</button>
          <button class="segment" data-filter="paused" type="button">下架</button>
          <button class="segment" data-filter="sale" type="button">活動</button>
        </div>
      </section>

      <section class="toolbar">
        <button id="add-product-button" class="primary-action" type="button">
          <i data-lucide="plus"></i>
          新增商品
        </button>
        <button id="marquee-button" class="secondary-action" type="button">
          <i data-lucide="badge-alert"></i>
          跑馬燈
        </button>
      </section>

      <section id="product-list" class="product-list" aria-label="商品清單"></section>
      <section id="empty-state" class="empty-state hidden">
        <i data-lucide="package-search"></i>
        <p>沒有符合的商品</p>
      </section>
    </main>
  </div>

  <dialog id="product-dialog" class="sheet-dialog">
    <form id="product-form" method="dialog">
      <header class="dialog-header">
        <div>
          <p class="eyebrow">PRODUCT</p>
          <h2 id="dialog-title">編輯商品</h2>
        </div>
        <button class="icon-button" value="cancel" formnovalidate aria-label="關閉" type="submit">
          <i data-lucide="x"></i>
        </button>
      </header>

      <div class="form-grid">
        <input type="hidden" id="field-id">
        <label>
          <span>上架狀態</span>
          <select id="field-active">
            <option value="TRUE">上架</option>
            <option value="FALSE">下架</option>
          </select>
        </label>
        <label>
          <span>品牌</span>
          <div class="option-control">
            <select id="field-brand" required></select>
            <button id="add-brand-option" class="mini-action" type="button" aria-label="新增品牌">
              <i data-lucide="plus"></i>
            </button>
          </div>
        </label>
        <label class="wide">
          <span>商品名稱</span>
          <textarea id="field-name" required rows="2"></textarea>
        </label>
        <label>
          <span>尺寸</span>
          <input id="field-size" placeholder="F">
        </label>
        <label>
          <span>活動標籤</span>
          <div class="option-control">
            <select id="field-sale-label"></select>
            <button id="add-sale-option" class="mini-action" type="button" aria-label="新增活動">
              <i data-lucide="plus"></i>
            </button>
          </div>
        </label>
        <label>
          <span>專櫃價</span>
          <input id="field-market-price" inputmode="numeric">
        </label>
        <label>
          <span>特價</span>
          <input id="field-sale-price" inputmode="numeric" required>
        </label>
        <label>
          <span>特賣金額</span>
          <input id="field-special-price" inputmode="numeric">
        </label>
        <label>
          <span>一般折數</span>
          <input id="field-discount" inputmode="decimal" placeholder="0.8" readonly>
          <small id="discount-hint" class="field-hint">特價 ÷ 專櫃價</small>
        </label>
        <label>
          <span>特賣折數</span>
          <input id="field-special-discount" inputmode="decimal" placeholder="0.65" readonly>
          <small id="special-discount-hint" class="field-hint">特賣金額 ÷ 特價</small>
        </label>
        <label class="wide">
          <span>社團貼文連結</span>
          <div class="clearable-field">
            <input id="field-post-url" type="url">
            <button class="mini-action clear-action" type="button" data-clear-field="post-url" aria-label="清空社團貼文連結">
              <i data-lucide="x"></i>
            </button>
          </div>
        </label>
        <label class="wide">
          <span>圖片 1</span>
          <div class="image-field">
            <div class="clearable-field">
              <input id="field-image-1" type="url" placeholder="圖片網址或上傳圖片">
              <button class="mini-action clear-action" type="button" data-clear-image="1" aria-label="清空圖片 1">
                <i data-lucide="x"></i>
              </button>
            </div>
            <input id="file-image-1" type="file" accept="image/*">
            <img id="preview-image-1" class="image-preview hidden" alt="圖片 1 預覽">
          </div>
        </label>
        <label class="wide">
          <span>圖片 2</span>
          <div class="image-field">
            <div class="clearable-field">
              <input id="field-image-2" type="url" placeholder="圖片網址或上傳圖片">
              <button class="mini-action clear-action" type="button" data-clear-image="2" aria-label="清空圖片 2">
                <i data-lucide="x"></i>
              </button>
            </div>
            <input id="file-image-2" type="file" accept="image/*">
            <img id="preview-image-2" class="image-preview hidden" alt="圖片 2 預覽">
          </div>
        </label>
        <label class="wide">
          <span>圖片 3</span>
          <div class="image-field">
            <div class="clearable-field">
              <input id="field-image-3" type="url" placeholder="圖片網址或上傳圖片">
              <button class="mini-action clear-action" type="button" data-clear-image="3" aria-label="清空圖片 3">
                <i data-lucide="x"></i>
              </button>
            </div>
            <input id="file-image-3" type="file" accept="image/*">
            <img id="preview-image-3" class="image-preview hidden" alt="圖片 3 預覽">
          </div>
        </label>
        <label class="wide">
          <span>圖片 4</span>
          <div class="image-field">
            <div class="clearable-field">
              <input id="field-image-4" type="url" placeholder="圖片網址或上傳圖片">
              <button class="mini-action clear-action" type="button" data-clear-image="4" aria-label="清空圖片 4">
                <i data-lucide="x"></i>
              </button>
            </div>
            <input id="file-image-4" type="file" accept="image/*">
            <img id="preview-image-4" class="image-preview hidden" alt="圖片 4 預覽">
          </div>
        </label>
        <label class="wide">
          <span>圖片 5</span>
          <div class="image-field">
            <div class="clearable-field">
              <input id="field-image-5" type="url" placeholder="圖片網址或上傳圖片">
              <button class="mini-action clear-action" type="button" data-clear-image="5" aria-label="清空圖片 5">
                <i data-lucide="x"></i>
              </button>
            </div>
            <input id="file-image-5" type="file" accept="image/*">
            <img id="preview-image-5" class="image-preview hidden" alt="圖片 5 預覽">
          </div>
        </label>
      </div>

      <footer class="dialog-actions">
        <button value="cancel" class="secondary-action" type="submit" formnovalidate>取消</button>
        <button id="save-product-button" class="primary-action" type="button">
          <i data-lucide="save"></i>
          儲存
        </button>
      </footer>
    </form>
  </dialog>

  <dialog id="marquee-dialog" class="sheet-dialog">
    <form id="marquee-form" method="dialog">
      <header class="dialog-header">
        <div>
          <p class="eyebrow">MARQUEE</p>
          <h2>跑馬燈</h2>
        </div>
        <button class="icon-button" value="cancel" formnovalidate aria-label="關閉" type="submit">
          <i data-lucide="x"></i>
        </button>
      </header>

      <div id="marquee-list" class="marquee-list"></div>

      <footer class="dialog-actions">
        <button id="add-marquee-row" class="secondary-action" type="button">
          <i data-lucide="plus"></i>
          新增
        </button>
        <button id="save-marquee-button" class="primary-action" type="button">
          <i data-lucide="save"></i>
          儲存
        </button>
      </footer>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <div id="dialog-toast" class="dialog-toast" role="status"></div>
  <script src="./app.js"></script>
</body>
</html>
